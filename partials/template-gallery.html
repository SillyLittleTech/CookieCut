<!-- === TEMPLATE GALLERY PANEL === -->
<div
  id="template-gallery-panel"
  class="template-gallery-panel w-full hidden animate-fade-in"
>
  <div
    class="bg-white p-6 md:p-8 rounded-lg shadow-lg border border-gray-200 space-y-6"
  >
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div>
        <h2 class="text-2xl font-bold text-gray-900 font-display">
          Template Browser
        </h2>
        <p class="text-sm text-gray-500">
          Pick a starter template or fill empty slots with your own .cookie
          files.
        </p>
      </div>
      <button
        id="template-gallery-back-btn"
        class="bg-gray-700 hover:bg-gray-800 text-white font-semibold py-2 px-4 rounded-lg text-sm shadow-md transition-all duration-150"

        Back to Editor
      </button>
    </div>

    <output
      id="template-gallery-status"
      class="min-h-[1.25rem] block text-sm text-gray-600"

      class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4"
